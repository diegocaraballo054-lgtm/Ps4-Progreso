<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: #121212;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }
    .grid-juegos {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 20px;
        width: 100%;
        max-width: 1200px;
    }
    .card {
        background: #1e1e1e;
        border-radius: 12px;
        overflow: hidden;
        text-align: center;
        padding-bottom: 15px;
        border: 1px solid #333;
        cursor: pointer;
        transition: transform 0.2s ease, border-color 0.2s ease, opacity 0.3s ease;
        position: relative;
    }
    /* Animación al pasar el mouse */
    .card:hover {
        transform: scale(1.05);
        border-color: #007bff;
    }
    /* Estilo cuando el juego está marcado como pasado */
    .card.marcado {
        opacity: 0.5;
        border-color: #28a745;
    }
    .caratula {
        width: 100%;
        height: 230px;
        object-fit: cover;
        pointer-events: none; /* Para que no interfiera con el click */
    }
    .nombre {
        display: block;
        margin: 12px 5px;
        font-size: 14px;
        font-weight: bold;
        pointer-events: none;
    }
    .status-badge {
        font-size: 12px;
        color: #28a745;
        font-weight: bold;
        display: none;
    }
    .marcado .status-badge {
        display: block;
    }
    .buy-link {
        position: absolute;
        top: 20px;
        left: 20px;
        color: #007bff; /* Color discreto */
        text-decoration: none;
        font-size: 14px;
        font-weight: bold;
        transition: color 0.3s ease;
    }
    .buy-link:hover {
        color: #007bff; /* Se pone azul al pasar el mouse */
        text-decoration: underline;
    }

    /* Ajuste para móviles para que no se pegue al borde */
    @media (max-width: 600px) {
        .buy-link {
            position: static;
            margin-bottom: 20px;
        }
    }
    .contador-progreso {
        position: absolute;
        top: 20px;
        right: 20px;
        background: #28a745;
        padding: 8px 15px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* Para que en el celular no se amontone con el otro link */
    @media (max-width: 600px) {
        .contador-progreso {
            position: static;
            margin-top: 10px;
        }
    }
    .search-container {
        width: 100%;
        max-width: 400px;

    }
    #buscador {
        width: 100%;

        border-radius: 25px;

        background-color: #1e1e1e;
        color: white;
        font-size: 16px;
        outline: none;
        transition: border-color 0.3s;
    }
    #buscador:focus {
        border-color: #007bff;
        box-shadow: 0 0 8px rgba(0, 123, 255, 0.4);
    }
    .add-card {
        cursor: pointer;
        background: #2e2e2e;
    }
    .add-card:hover {
        transform: none;
        border-color: #444;
    }
    .add-card-icon {
        width: 100%;
        height: 230px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 72px;
        color: #007bff;
        background: #121212;
    }
    .add-card .nombre {
        margin-top: 15px;
    }
    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1000;
        display: none;
    }
    .modal {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #1e1e1e;
        padding: 20px;
        border-radius: 12px;
        z-index: 1001;
        color: white;
        display: none;
        min-width: 300px;
    }
    .modal-content {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    .modal-content h2 {
        margin: 0;
        text-align: center;
    }
    .modal-content input[type="text"],
    .modal-content input[type="url"] {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #444;
        background-color: #2e2e2e;
        color: white;
        font-size: 14px;
    }
    .modal-content label {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }
    .modal-content label span {
        flex: 1;
    }
    .modal-content input[type="file"],
    .modal-content input[type="url"] {
        width: 100%;
    }
    .modal-content button {
        padding: 10px;
        border-radius: 8px;
        border: none;
        background-color: #007bff;
        color: white;
        cursor: pointer;
        font-size: 14px;
    }
    .modal-content button:hover {
        background-color: #0056b3;
    }
    .modal-buttons {
        display: flex;
        gap: 10px;
        justify-content: center;
    }
    .admin-bar {
        width: 100%;
        max-width: 1200px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
    }
    .admin-bar button {
        padding: 10px 16px;
        border-radius: 25px;
        border: none;
        background: #007bff;
        color: white;
        cursor: pointer;
        font-size: 14px;
    }
    .admin-bar button:hover {
        background: #0056b3;
    }
    .admin-panel {
        width: 100%;
        max-width: 1200px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 20px;
    }
    .admin-panel h2 {
        margin: 0 0 10px;
        font-size: 16px;
    }
    .solicitud-card {
        background: #2a2a2a;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .solicitud-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }
    .solicitud-actions button {
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
    }
    .solicitud-accept {
        background: #28a745;
        color: white;
    }
    .solicitud-reject {
        background: #dc3545;
        color: white;
    }
    .delete-button {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(220, 53, 69, 0.9);
        border: none;
        color: white;
        padding: 6px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
        display: none;
    }
    .card.admin-visible .delete-button {
        display: block;
    }
</style>

            { n: "Cyberpunk 2077", img: "https://upload.wikimedia.org/wikipedia/en/9/9f/Cyberpunk_2077_box_art.jpg" },

            { n: "Devil may cry collection, 4 y 5", img: "https://exoplayzone.com/wp-content/uploads/2022/03/devil-may-cry-hd-collection.jpg" }
        ];

        // Cargar juegos desde Firestore o usar por defecto
        let juegos = [];
        let solicitudes = [];
        let esAdmin = false;

        const contenedor = document.getElementById('contenedor');

        async function cargarDatosFirebase() {
            await Promise.all([cargarJuegosFirestore(), cargarSolicitudesFirestore()]);
            cargarJuegos();
        }

        async function cargarJuegosFirestore() {
            try {
                const snapshot = await db.collection('juegos').get();
                if (snapshot.empty) {
                    juegos = [...juegosDefault];
                } else {
                    juegos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                }
            } catch (error) {
                console.error('Error cargando juegos de Firebase:', error);
                juegos = [...juegosDefault];
            }
        }

        async function cargarSolicitudesFirestore() {
            try {
                const snapshot = await db.collection('solicitudes').orderBy('fecha', 'desc').get();
                solicitudes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            } catch (error) {
                console.error('Error cargando solicitudes de Firebase:', error);
                solicitudes = [];
            }
        }

        function actualizarContador() {
            const total = juegos.length;
            let completados = 0;
            for (let i = 0; i < total; i++) {
                if (localStorage.getItem(`juego-${i}`) === 'true') {
                    completados++;
                }
            }
            document.getElementById('contador').innerText = `Juegos completados: ${completados} / ${total}`;
        }

        function guardarDatos() {
            // Guardamos solo el estado de completado localmente.
        }

        function cargarJuegos() {
            contenedor.innerHTML = "";
            juegos.forEach((juego, index) => {
                const estaMarcado = localStorage.getItem(`juego-${index}`) === 'true';
                contenedor.innerHTML += `
                    <div class="card ${estaMarcado ? 'marcado' : ''} ${esAdmin ? 'admin-visible' : ''}" id="card-${index}" onclick="alternarEstado(${index})">
                        <img src="${juego.img}" class="caratula" onerror="this.src='https://via.placeholder.com/200x300?text=Error+Link'">
                        <span class="nombre">${juego.n}</span>
                        <span class="status-badge">✓ PASADO</span>
                        ${esAdmin && juego.id ? `<button class="delete-button" onclick="event.stopPropagation(); borrarJuego(${index})">Eliminar</button>` : ''}
                    </div>
                `;
            });
            contenedor.innerHTML += `
                <div class="card add-card" onclick="mostrarModal()">
                    <div class="add-card-icon">+</div>
                    <span class="nombre">Agregar Juego</span>
                </div>
            `;
            actualizarContador();
            renderAdminPanel();
        }

        function alternarEstado(id) {
            if (!esAdmin) {
                alert('Solo el administrador puede marcar juegos como completados.');
                return;
            }
            const tarjeta = document.getElementById(`card-${id}`);
            const nuevoEstado = !tarjeta.classList.contains('marcado');
            localStorage.setItem(`juego-${id}`, nuevoEstado);
            if (nuevoEstado) {
                tarjeta.classList.add('marcado');
            } else {
                tarjeta.classList.remove('marcado');
            }
            actualizarContador();
        }

        function mostrarModal() {
            actualizarModal();
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function cerrarModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('modal-nombre').value = '';
            document.getElementById('modal-imagen-link').value = '';
            document.getElementById('modal-imagen-file').value = '';
            document.querySelector('input[name="img-type"][value="link"]').checked = true;
        }

        function actualizarModal() {
            document.getElementById('modal-title').innerText = esAdmin ? 'Agregar Nuevo Juego' : 'Enviar solicitud de juego';
            document.getElementById('modal-action-button').innerText = esAdmin ? 'Agregar' : 'Enviar solicitud';
        }

        function agregarDesdeModal() {
            const nombre = document.getElementById('modal-nombre').value.trim();
            if (!nombre) {
                alert('Por favor, ingresa el nombre del juego.');
                return;
            }
            const type = document.querySelector('input[name="img-type"]:checked').value;
            if (type === 'link') {
                const img = document.getElementById('modal-imagen-link').value.trim();
                if (!img) {
                    alert('Por favor, ingresa una URL válida para la imagen.');
                    return;
                }
                if (esAdmin) {
                    agregarJuegoFinal(nombre, img);
                } else {
                    agregarSolicitud(nombre, img);
                }
            } else {
                const file = document.getElementById('modal-imagen-file').files[0];
                if (!file) {
                    alert('Por favor, selecciona un archivo de imagen.');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = e.target.result;
                    if (esAdmin) {
                        agregarJuegoFinal(nombre, img);
                    } else {
                        agregarSolicitud(nombre, img);
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        async function agregarSolicitud(nombre, imagen) {
            const solicitud = {
                nombre,
                imagen,
                fecha: new Date().toLocaleString()
            };
            try {
                await db.collection('solicitudes').add(solicitud);
                cerrarModal();
                alert('Solicitud enviada. El administrador podrá revisar y aceptar.');
                await cargarSolicitudesFirestore();
                renderAdminPanel();
            } catch (error) {
                console.error('Error enviando solicitud:', error);
                alert('No se pudo enviar la solicitud. Intenta de nuevo.');
            }
        }

        async function agregarJuegoFinal(nombre, img) {
            try {
                await db.collection('juegos').add({ n: nombre, img });
                cerrarModal();
                await cargarJuegosFirestore();
                cargarJuegos();
                alert('Juego agregado correctamente.');
            } catch (error) {
                console.error('Error agregando juego:', error);
                alert('No se pudo agregar el juego. Intenta de nuevo.');
            }
        }

        async function borrarJuego(index) {
            if (!esAdmin) {
                alert('Solo el administrador puede borrar juegos.');
                return;
            }
            const juego = juegos[index];
            if (!juego || !juego.id) {
                alert('Este juego no se puede borrar desde aquí.');
                return;
            }
            const confirmado = confirm('¿Seguro quieres eliminar este juego?');
            if (!confirmado) return;
            try {
                await db.collection('juegos').doc(juego.id).delete();
                await cargarJuegosFirestore();
                cargarJuegos();
            } catch (error) {
                console.error('Error borrando juego:', error);
                alert('No se pudo borrar el juego. Intenta de nuevo.');
            }
        }

        function toggleAdmin() {
            if (esAdmin) {
                esAdmin = false;
                document.getElementById('adminButton').innerText = 'Iniciar sesión admin';
                document.getElementById('adminStatus').innerText = 'Modo visitante';
                cargarJuegos();
                return;
            }
            const clave = prompt('Ingresa la contraseña de administrador:');
            if (clave === null) return;
            if (clave === ADMIN_PASSWORD) {
                esAdmin = true;
                document.getElementById('adminButton').innerText = 'Cerrar sesión admin';
                document.getElementById('adminStatus').innerText = 'Modo admin';
                cargarJuegos();
                alert('Modo administrador activado. Ahora puedes agregar y borrar juegos directamente.');
            } else {
                alert('Contraseña incorrecta.');
            }
        }

        function renderAdminPanel() {
            const panel = document.getElementById('admin-panel');
            const solicitudesContainer = document.getElementById('solicitudes-container');
            if (!esAdmin) {
                panel.style.display = 'none';
                return;
            }
            panel.style.display = 'block';
            if (solicitudes.length === 0) {
                solicitudesContainer.innerHTML = '<p>No hay solicitudes pendientes.</p>';
                return;
            }
            solicitudesContainer.innerHTML = '';
            solicitudes.forEach(solicitud => {
                solicitudesContainer.innerHTML += `
                    <div class="solicitud-card">
                        <strong>${solicitud.nombre}</strong>
                        <span>${solicitud.fecha}</span>
                        <span>Imagen: ${solicitud.imagen.startsWith('data:') ? 'archivo subido' : solicitud.imagen}</span>
                        <div class="solicitud-actions">
                            <button class="solicitud-accept" onclick="aceptarSolicitud('${solicitud.id}')">Aceptar</button>
                            <button class="solicitud-reject" onclick="rechazarSolicitud('${solicitud.id}')">Rechazar</button>
                        </div>
                    </div>
                `;
            });
        }

        async function aceptarSolicitud(id) {
            const solicitud = solicitudes.find(item => item.id === id);
            if (!solicitud) return;
            try {
                await db.collection('juegos').add({ n: solicitud.nombre, img: solicitud.imagen });
                await db.collection('solicitudes').doc(id).delete();
                await cargarDatosFirebase();
                alert('Solicitud aceptada y juego agregado.');
            } catch (error) {
                console.error('Error aceptando solicitud:', error);
                alert('No se pudo aceptar la solicitud. Intenta de nuevo.');
            }
        }

        async async function rechazarSolicitud(id) {
            try {
                await db.collection('solicitudes').doc(id).delete();
                await cargarSolicitudesFirestore();
                renderAdminPanel();
                alert('Solicitud rechazada.');
            } catch (error) {
                console.error('Error rechazando solicitud:', error);
                alert('No se pudo rechazar la solicitud. Intenta de nuevo.');
            }
        }

        function filtrarJuegos() {
            const texto = document.getElementById('buscador').value.toLowerCase();
            const tarjetas = document.querySelectorAll('.card');
            tarjetas.forEach(tarjeta => {
                const nombreJuego = tarjeta.querySelector('.nombre').innerText.toLowerCase();
                if (nombreJuego.includes(texto)) {
                    tarjeta.style.display = 'block';
                } else {
                    tarjeta.style.display = 'none';
                }
            });
        }

        cargarDatosFirebase();
    </script>
</body>
</html>
